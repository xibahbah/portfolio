<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keith Gong — Commercial</title>
<script>
(function(){
  const params = new URLSearchParams(window.location.search);
  if (params.has('desktop')) return;
  const isMobile = window.matchMedia('(max-width: 700px)').matches || /Android|iPhone|iPod|Mobile/i.test(navigator.userAgent);
  if (!isMobile) return;
  window.location.replace('mobile-site/commercial.html' + window.location.search + window.location.hash);
})();
</script>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:#0a0a0a;color:#fff;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;min-height:100vh;}
  #top-nav{position:sticky;top:0;z-index:100;background:#0a0a0a;display:flex;align-items:baseline;gap:clamp(28px,4vw,72px);padding:24px clamp(24px,4vw,56px) 18px;border-bottom:1px solid rgba(255,255,255,0.07);}
  .site-name{flex:0 0 auto;font-size:16px;font-weight:400;letter-spacing:10px;text-transform:uppercase;color:#fff;text-decoration:none;white-space:nowrap;}
  .nav-links{flex:1;display:flex;justify-content:space-between;gap:clamp(20px,4vw,72px);min-width:0;}
  .nav-links a{font-size:12px;letter-spacing:6px;text-transform:uppercase;color:rgba(255,255,255,0.45);text-decoration:none;white-space:nowrap;}
  .nav-links a:hover,.nav-links a.active{color:#fff;}
  @media (max-width: 820px){#top-nav{align-items:flex-start;flex-wrap:wrap;gap:18px 28px;}.nav-links{flex:1 1 100%;justify-content:space-between;gap:16px 24px;flex-wrap:wrap;}.site-name{letter-spacing:8px;}}
  .auth-note{padding:16px 48px 14px;border-bottom:1px solid rgba(255,255,255,0.07);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.28);}
  #projects{padding:24px 48px 60px;}
  .project-row{display:flex;align-items:flex-start;gap:60px;padding:48px 0;border-bottom:1px solid rgba(255,255,255,0.08);}
  .project-info{flex:0 0 280px;display:flex;flex-direction:column;justify-content:center;align-self:stretch;}
  .project-num{font-size:10px;letter-spacing:4px;color:rgba(255,255,255,0.3);margin-bottom:16px;text-transform:uppercase;}
  .project-name{font-size:28px;font-weight:300;letter-spacing:2px;line-height:1.3;margin-bottom:16px;}
  .project-meta{font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.35);text-transform:uppercase;}
  .project-video{flex:0 0 400px;margin-left:auto;}
  .video-thumb{position:relative;cursor:pointer;overflow:hidden;width:400px;}
  .video-thumb img{width:400px;height:auto;display:block;opacity:0.85;transition:opacity 0.3s;}
  .video-thumb:hover img{opacity:1;}
  .play-btn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
  .play-btn svg{width:64px;height:64px;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.6));}
  /* Video modal */
  #modal{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;}
  #modal.on{display:flex;}
  #modal-inner{width:80vw;max-width:900px;}
  #modal-inner video{width:100%;display:block;}
  #modal-placeholder{width:80vw;max-width:900px;aspect-ratio:16/9;background:#111;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.1);}
  #modal-placeholder span{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,0.3);}
  #modal-close{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,0.4);cursor:pointer;margin-top:20px;}
  #modal-close:hover{color:#fff;}
</style>
</head>

<script>
(function(){const qs=window.location.search;if(!qs)return;document.querySelectorAll('a[href$=".html"]').forEach(a=>{const h=a.getAttribute('href');if(h&&!h.includes('?'))a.setAttribute('href',h+qs);});})();
const modal = document.getElementById('modal');
const modalVideo = document.getElementById('modal-video');
function closeModal() { modal.classList.remove('on'); modalVideo.pause(); modalVideo.src = ''; }
document.querySelectorAll('.video-thumb').forEach(t => {
  t.addEventListener('click', () => { modalVideo.src = t.dataset.video; modal.classList.add('on'); modalVideo.play(); });
});
document.getElementById('modal-close').addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
