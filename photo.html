<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo</title>
<link rel="icon" type="image/png" sizes="386x384" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<script>
(function(){
  const params = new URLSearchParams(window.location.search);
  if (params.has('desktop')) return;
  const isMobile = window.matchMedia('(max-width: 700px)').matches || /Android|iPhone|iPod|Mobile/i.test(navigator.userAgent);
  if (!isMobile) return;
  window.location.replace('mobile-site/index.html' + window.location.search + window.location.hash);
})();
</script>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:#0a0a0a;color:#fff;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;min-height:100vh;}
  #top-nav{position:sticky;top:0;z-index:100;background:#0a0a0a;display:flex;align-items:baseline;gap:clamp(28px,4vw,72px);padding:24px clamp(24px,4vw,56px) 18px;border-bottom:1px solid rgba(255,255,255,0.07);}
  .site-name{flex:0 0 auto;font-size:16px;font-weight:400;letter-spacing:10px;text-transform:uppercase;color:#fff;text-decoration:none;white-space:nowrap;}
  .nav-links{flex:1;display:flex;justify-content:space-between;gap:clamp(20px,4vw,72px);min-width:0;}
  .nav-links a{font-size:12px;letter-spacing:6px;text-transform:uppercase;color:rgba(255,255,255,0.45);text-decoration:none;white-space:nowrap;}
  .nav-links a:hover,.nav-links a.active{color:#fff;}
  @media (max-width: 820px){#top-nav{align-items:flex-start;flex-wrap:wrap;gap:18px 28px;}.nav-links{flex:1 1 100%;justify-content:space-between;gap:16px 24px;flex-wrap:wrap;}.site-name{letter-spacing:8px;}}
  .auth-note{padding:16px 48px 14px;border-bottom:1px solid rgba(255,255,255,0.07);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.28);}
  #grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:3px;
    padding:3px;
    align-items:start;  
  }

  .col{
    display:flex;
    flex-direction:column;
    gap:3px;
  }

  .photo-item{
    width:100%;
    overflow:visible;
    cursor:pointer;
    background:#111;
  }

  .photo-item img{
    width:100%;
    height:auto;
    display:block;
    object-fit:contain;
    opacity:0.92;
    transition:opacity 0.3s;
  }

  .photo-item:hover img{
    opacity:1;
  }
  #lb{position:fixed;inset:0;background:rgba(0,0,0,0.96);z-index:200;display:none;align-items:center;justify-content:center;}
  #lb.on{display:flex;}
  #lb img{max-width:90vw;max-height:90vh;object-fit:contain;}
  #lb-x{position:fixed;top:24px;right:28px;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.5);cursor:pointer;}
  #lb-x:hover{color:#fff;}
  .lb-nav{position:fixed;top:50%;transform:translateY(-50%);border:0;background:transparent;color:rgba(255,255,255,0.48);font:300 46px/1 'Helvetica Neue',Helvetica,Arial,sans-serif;cursor:pointer;padding:28px;z-index:201;}
  .lb-nav:hover{color:#fff;}
  #lb-prev{left:20px;}
  #lb-next{right:20px;}
  #lb-status{position:fixed;left:50%;top:50%;transform:translate(-50%,-42%);z-index:202;padding:8px 14px;border-radius:3px;background:rgba(120,120,120,0.32);color:rgba(255,255,255,0.62);font-size:10px;letter-spacing:3px;text-transform:uppercase;opacity:0;pointer-events:none;transition:opacity 0.18s ease,transform 0.18s ease;}
  #lb-status.on{opacity:1;transform:translate(-50%,-50%);}
</style>
</head>
<body>
<div id="top-nav">
  <a class="site-name" href="index.html">Keith Gong</a>
  <div class="nav-links">
    <a href="photo.html" class="active">Photo</a>
    <a href="editorial.html">Editorial</a>
    <a href="commercial.html">Commercial</a>
    <a href="contact.html">Contact</a>
    <a href="cv.html">Profile</a>
  </div>
</div>
<div class="auth-note">None of this work is AI-generated.</div>
<div id="grid"></div>
<div id="lb">
  <div id="lb-x">Close</div>
  <button class="lb-nav" id="lb-prev" type="button" aria-label="Previous photo">&lt;</button>
  <img id="lb-img" alt="">
  <button class="lb-nav" id="lb-next" type="button" aria-label="Next photo">&gt;</button>
  <div id="lb-status" aria-live="polite"></div>
</div>
<script>
(function(){const qs=window.location.search;if(!qs)return;document.querySelectorAll('a[href$=".html"]').forEach(a=>{const h=a.getAttribute('href');if(h&&!h.includes('?'))a.setAttribute('href',h+qs);});})();
</script>
<script>
const PHOTOS = [
  { thumb: "thumbs/1.png", full: "website/1.png", width: 3659 },
  { thumb: "thumbs/2.png", full: "website/2.png", width: 3551 },
  { thumb: "thumbs/3.png", full: "website/3.png", width: 3607 },
  { thumb: "thumbs/4.png", full: "website/4.png", width: 2566 },
  { thumb: "thumbs/5.png", full: "website/5.png", width: 2016 },
  { thumb: "thumbs/6.png", full: "website/6.png", width: 3442 },
  { thumb: "thumbs/7.png", full: "website/7.jpg", width: 5999 },
  { thumb: "thumbs/8.png", full: "website/8.png", width: 1579 },
  { thumb: "thumbs/9.png", full: "website/9.png", width: 3639 },
  { thumb: "thumbs/10.png", full: "website/10.png", width: 3796 },
  { thumb: "thumbs/11.png", full: "website/11.png", width: 3872 },
  { thumb: "thumbs/12.png", full: "website/12.png", width: 3301 },
  { thumb: "thumbs/13.png", full: "website/13.png", width: 1272 },
  { thumb: "thumbs/14.png", full: "website/14.png", width: 1898 },
  { thumb: "thumbs/15.png", full: "website/15.png", width: 5754 },
  { thumb: "thumbs/16.png", full: "website/16.png", width: 3868 },
  { thumb: "thumbs/17.png", full: "website/17.png", width: 2191 },
  { thumb: "thumbs/18.png", full: "website/18.jpg", width: 5036 },
  { thumb: "thumbs/19.png", full: "website/19.png", width: 3380 },
  { thumb: "thumbs/20.png", full: "website/20.png", width: 1417 },
  { thumb: "thumbs/21.png", full: "website/21.png", width: 1336 },
  { thumb: "thumbs/really.png", full: "website/really.png", width: 936 }
];
</script>
<script>
const grid = document.getElementById('grid');
const cols = [0,1,2].map(() => { const c = document.createElement('div'); c.className = 'col'; grid.appendChild(c); return c; });
const lb = document.getElementById('lb');
const lbImg = document.getElementById('lb-img');
const lbStatus = document.getElementById('lb-status');
let currentPhotoIndex = 0;
let statusTimer = null;
function showStatus(text) {
  lbStatus.textContent = text;
  lbStatus.classList.add('on');
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => lbStatus.classList.remove('on'), 1800);
}
function hideStatus() {
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => lbStatus.classList.remove('on'), 180);
}
function showPhoto(index) {
  currentPhotoIndex = (index + PHOTOS.length) % PHOTOS.length;
  lbImg.src = PHOTOS[currentPhotoIndex].full;
  lb.classList.add('on');
}
function closePhoto() {
  lb.classList.remove('on');
  lbStatus.classList.remove('on');
}
function nextPhoto() {
  showStatus('Next');
  showPhoto(currentPhotoIndex + 1);
}
function prevPhoto() {
  showStatus('Previous');
  showPhoto(currentPhotoIndex - 1);
}
PHOTOS.forEach((src, i) => {
  const col = i % 3;
  const d = document.createElement('div'); d.className = 'photo-item';
  const img = document.createElement('img');
  img.src = src.thumb;
  img.loading = 'lazy';
  img.decoding = 'async';
  img.alt = '';
  d.appendChild(img);
  d.addEventListener('click', () => showPhoto(i));
  cols[col].appendChild(d);
});
document.getElementById('lb-x').addEventListener('click', closePhoto);
document.getElementById('lb-prev').addEventListener('click', prevPhoto);
document.getElementById('lb-next').addEventListener('click', nextPhoto);
lbImg.addEventListener('load', hideStatus);
lb.addEventListener('click', (e) => { if (e.target === lb) closePhoto(); });
document.addEventListener('keydown', (e) => {
  if (!lb.classList.contains('on')) return;
  if (e.key === 'Escape') closePhoto();
  if (e.key === 'ArrowLeft') prevPhoto();
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    nextPhoto();
  }
});
</script>
</body>
</html>
