<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keith Gong — Commercial</title>
<meta name="theme-color" content="#0a0a0a">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{background:#0a0a0a;color:#fff;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;width:100%;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
  body{max-width:540px;margin:0 auto;}

  #top-nav{position:relative;z-index:5;background:#0a0a0a;border-bottom:1px solid rgba(255,255,255,0.07);padding-top:18px;}
  .nav-brand{--brand-tracking:clamp(7px,2.7vw,11px);display:block;width:100%;padding:8px 24px 0;font-size:18px;font-weight:400;letter-spacing:var(--brand-tracking);text-indent:var(--brand-tracking);text-transform:uppercase;color:#fff;text-decoration:none;text-align:center;line-height:1;}
  @media (min-width:540px){.nav-brand{--brand-tracking:13px;font-size:20px;}}
  .nav-links{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0;padding:14px 24px 16px;border-top:1px solid rgba(255,255,255,0.06);margin-top:18px;}
  .nav-links a{flex:0 0 auto;font-size:9px;letter-spacing:0.35px;text-transform:uppercase;color:rgba(255,255,255,0.42);text-decoration:none;white-space:nowrap;padding:6px 0;}
  .nav-links a.active{color:#fff;}

  .auth-note{padding:12px 24px 11px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:7px;letter-spacing:1.25px;text-transform:uppercase;color:rgba(255,255,255,0.26);text-align:center;}

  #projects{padding:12px 0 56px;}
  .project-row{display:flex;flex-direction:column;padding:24px 18px 36px;border-bottom:1px solid rgba(255,255,255,0.06);gap:18px;}
  .project-video{order:1;width:86%;max-width:420px;margin:0 auto;}
  .video-thumb{position:relative;cursor:pointer;overflow:hidden;width:100%;}
  .video-thumb img{width:100%;height:auto;display:block;opacity:0.92;}
  .play-btn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
  .play-btn svg{width:44px;height:44px;filter:drop-shadow(0 2px 12px rgba(0,0,0,0.7));}
  .project-info{order:2;display:flex;flex-direction:column;text-align:center;}
  .project-num{font-size:9px;letter-spacing:4px;color:rgba(255,255,255,0.32);margin-bottom:14px;text-transform:uppercase;}
  .project-name{font-size:22px;font-weight:300;letter-spacing:1.5px;line-height:1.25;margin-bottom:10px;}
  .project-meta{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.45);text-transform:uppercase;}

  /* Video modal */
  #modal{position:fixed;inset:0;background:rgba(0,0,0,0.97);z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;padding:max(54px, env(safe-area-inset-top,0px)) 18px env(safe-area-inset-bottom,0);}
  #modal.on{display:flex;}
  #modal-inner{width:100%;max-width:520px;}
  #modal-inner video{width:100%;display:block;background:#000;}
  #modal-close{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,0.55);cursor:pointer;margin-top:24px;padding:10px 18px;}

  @media (max-width:360px){
    .nav-links{padding-left:14px;padding-right:14px;}
    .nav-links a{font-size:8px;letter-spacing:0.15px;}
  }

  @media (min-width:540px){
    body{border-left:1px solid rgba(255,255,255,0.04);border-right:1px solid rgba(255,255,255,0.04);}
    .nav-links a{font-size:10px;letter-spacing:1px;}
  }
</style>
</head>
<body>
<div id="top-nav">
  <a class="nav-brand" href="index.html">Keith Gong</a>
  <nav class="nav-links">
    <a href="index.html">Photo</a>
    <a href="editorial.html">Editorial</a>
    <a href="commercial.html" class="active">Commercial</a>
    <a href="contact.html">Contact</a>
    <a href="cv.html">Profile</a>
  </nav>
</div>
<div class="auth-note">None of this work is AI-generated.</div>

<div class="project-row">

      </div>
    </div>
  </div>
<div class="project-row">
    <div class="project-info">
      <div class="project-num">02</div>
      <div class="project-name">Ditto</div>
      <div class="project-meta">Commercial · 2026</div>
    </div>
    <div class="project-video">
      <div class="video-thumb" data-video="../44.mov">
        <img src="../44-2.png" alt="">
        <div class="play-btn"><svg viewBox="0 0 60 60" fill="none"><circle cx="30" cy="30" r="29" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/><polygon points="24,18 46,30 24,42" fill="white"/></svg></div>
      </div>
    </div>
  </div>
<div class="project-row">
    <div class="project-info">
      <div class="project-num">03</div>
      <div class="project-name">Ditto</div>
      <div class="project-meta">Commercial · 2026</div>
    </div>
    <div class="project-video">
      <div class="video-thumb" data-video="../woc.mov">
        <img src="../woc-2.png" alt="">
        <div class="play-btn"><svg viewBox="0 0 60 60" fill="none"><circle cx="30" cy="30" r="29" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/><polygon points="24,18 46,30 24,42" fill="white"/></svg></div>

      </div>
    </div>
  </div>
</div>
<div id="modal">
  <div id="modal-inner"><video id="modal-video" controls playsinline webkit-playsinline></video></div>
  <div id="modal-close">Close</div>
</div>
<script>
(function(){const qs=window.location.search;if(!qs)return;document.querySelectorAll('a[href$=".html"]').forEach(a=>{const h=a.getAttribute('href');if(h&&!h.includes('?'))a.setAttribute('href',h+qs);});})();
const modal = document.getElementById('modal');
const modalVideo = document.getElementById('modal-video');
function closeModal() { modal.classList.remove('on'); modalVideo.pause(); modalVideo.src = ''; }
document.querySelectorAll('.video-thumb').forEach(t => {
  t.addEventListener('click', () => { modalVideo.src = t.dataset.video; modal.classList.add('on'); modalVideo.play(); });
});
document.getElementById('modal-close').addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
